<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refactor Monitor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="title-group">
          <h1>Refactor Monitor</h1>
          <div id="rootPath" class="root-path">No folder selected</div>
        </div>
        <div class="toolbar">
          <button id="chooseFolderButton" class="primary-button" type="button">
            <span aria-hidden="true">+</span>
            Folder
          </button>
          <button id="refreshButton" class="icon-button" type="button" title="Refresh">
            <span aria-hidden="true">&#8635;</span>
          </button>
        </div>
      </header>

      <section class="summary-grid" aria-label="Summary">
        <div class="metric">
          <span class="metric-label">LOC</span>
          <strong id="metricLines">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Nonblank</span>
          <strong id="metricNonBlank">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Files</span>
          <strong id="metricFiles">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Changed</span>
          <strong id="metricChanged">0</strong>
        </div>
        <div class="metric status-metric">
          <span class="metric-label">Last scan</span>
          <strong id="metricScan">Idle</strong>
        </div>
      </section>

      <main class="workspace">
        <section class="tree-panel" aria-label="Folder tree">
          <div class="panel-header">
            <h2>Files</h2>
            <input id="treeFilter" type="search" placeholder="Filter" />
          </div>
          <div class="tree-head">
            <button class="sort-button active" type="button" data-sort="name" aria-sort="ascending">
              <span>Name</span>
              <span class="sort-arrow">^</span>
            </button>
            <button class="sort-button numeric" type="button" data-sort="lines" aria-sort="none">
              <span>LOC</span>
              <span class="sort-arrow"></span>
            </button>
            <button class="sort-button numeric" type="button" data-sort="files" aria-sort="none">
              <span>Files</span>
              <span class="sort-arrow"></span>
            </button>
          </div>
          <div id="tree" class="tree" role="tree"></div>
        </section>

        <aside class="side-panel">
          <section class="details-panel">
            <div class="panel-header">
              <h2>Selection</h2>
            </div>
            <div id="selectionDetails" class="selection-details">
              Select a file or folder.
            </div>
          </section>

          <section class="details-panel">
            <div class="panel-header">
              <h2>Largest Files</h2>
            </div>
            <div id="largestFiles" class="list-panel"></div>
          </section>

          <section class="details-panel">
            <div class="panel-header">
              <h2>Git Changes</h2>
              <span id="gitState" class="panel-pill">off</span>
            </div>
            <div id="changedFiles" class="list-panel compact"></div>
          </section>
        </aside>
      </main>
    </div>

    <div id="emptyState" class="empty-state">
      <div>
        <h2>Choose a folder</h2>
        <p>The last opened folder will be restored automatically next time.</p>
        <button id="emptyChooseButton" class="primary-button" type="button">
          <span aria-hidden="true">+</span>
          Folder
        </button>
      </div>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
